services:
    paper-monitor:
        environment:
            - PAPER_MONITOR_STORAGE_ROOT=/data/uploads
            - PAPER_MONITOR_GIT_ROOT=/data/git-remotes
            - PAPER_MONITOR_BASE_URL=http://localhost:8080
            - PAPER_MONITOR_TTS_BASE_URL=http://paper-monitor-piper-api:8090
            - PAPER_MONITOR_PDE_BASE_URL=http://paper-data-extractor:8091
            - PAPER_MONITOR_PDE_PUBLIC_BASE_URL=http://localhost:8091
            - PAPER_MONITOR_PDE_API_BASE_URL=http://paper-data-extractor:8091
            - PAPER_MONITOR_PDE_INTERNAL_API_TOKEN=dev-pde-internal-token
            - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://paper-monitor-postgres:5432/paper_monitor
            - QUARKUS_DATASOURCE_USERNAME=paper_monitor
            - QUARKUS_DATASOURCE_PASSWORD=paper_monitor
        ports:
            - 8080:8080
        volumes:
            - ./app/data:/data:rw
        image: docker.io/nherbaut/paper-monitor:1.0.0-SNAPSHOT
        depends_on:
            - paper-monitor-postgres
            - paper-data-extractor
    paper-data-extractor:
        environment:
            - PAPER_DATA_EXTRACTOR_DEV_AUTH=true
            - PAPER_DATA_EXTRACTOR_INTERNAL_API_TOKEN=dev-pde-internal-token
            - PAPER_DATA_EXTRACTOR_PAPER_MONITOR_BASE_URL=http://paper-monitor:8080
        ports:
            - 8091:8091
        image: docker.io/nherbaut/paper-monitor-paper-data-extractor:latest
    paper-monitor-piper-api:
        ports:
            - 8090:8090
        environment:
            - PIPER_BIN=/usr/bin/piper
        volumes:
            - /home/nherbaut/.local/piper/models/:/models:ro
        image: docker.io/nherbaut/paper-monitor-piper-api:latest
    paper-monitor-postgres:
        image: postgres:16
        environment:
            - POSTGRES_DB=paper_monitor
            - POSTGRES_USER=paper_monitor
            - POSTGRES_PASSWORD=paper_monitor
        ports:
            - 5432:5432
        volumes:
            - ./data/postgres:/var/lib/postgresql/data
