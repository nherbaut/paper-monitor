classes:
  PaperReview:
    tree_root: true
    description: Review answers for taxonomy Requirements engineering paper classification
      and evaluation criteria + HCI-centric survey and taxonomy of Human-Generative-AI
      interactions
    slots:
    - paper_id
    - taxonomy_id
    - paper_class
    - purpose_of_using_genai
    - feedback_from_models_to_users
