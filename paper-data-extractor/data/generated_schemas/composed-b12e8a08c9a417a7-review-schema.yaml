slots:
  paper_id:
    range: string
    required: true
    description: Paper identifier in Paper Monitor.
  taxonomy_id:
    range: string
    required: true
    description: Composed taxonomy identifier.
  paper_class:
    title: Paper class
    required: true
    range: paper_class_enum
    multivalued: true
  purpose_of_using_genai:
    title: Purpose of using GenAI
    description: 'The objective or intent behind using generative AI in a task, reflecting
      how the human leverages the system.

      '
    required: true
    range: purpose_of_using_genai_enum
    multivalued: true
  feedback_from_models_to_users:
    title: Feedback from models to users
    description: 'The form and structure of outputs produced by the generative model
      and presented to the user.

      '
    required: false
    range: string
    multivalued: true
  output_modality:
    title: Output modality
    description: 'The modality or representation format of generated outputs.

      '
    required: false
    range: output_modality_enum
    multivalued: true
  function_of_genai_model:
    title: Function of GenAI model
    description: 'The functional role played by the generative model in producing
