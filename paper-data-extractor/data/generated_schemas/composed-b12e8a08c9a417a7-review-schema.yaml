    range: object_to_control_enum
    multivalued: true
  medium_of_control:
    title: Medium of control
    description: 'Interface or modality used to provide control.

      '
    required: false
    range: medium_of_control_enum
    multivalued: true
  level_of_engagement:
    title: Level of engagement
