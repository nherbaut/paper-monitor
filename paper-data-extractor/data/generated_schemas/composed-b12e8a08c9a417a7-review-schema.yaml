      '
    required: false
    range: output_synchronization_enum
    multivalued: false
  control_from_users_to_models:
    title: Control from users to models
    description: 'Mechanisms through which users influence or guide model behavior.

      '
    required: false
    range: string
    multivalued: true
  method_to_improve_output:
    title: Method to improve output
    description: 'Interaction techniques used to refine results.

      '
    required: false
    range: method_to_improve_output_enum
    multivalued: true
  object_to_control:
    title: Object to control
    description: 'Internal or external elements influenced by the user.

      '
