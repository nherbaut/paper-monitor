  meta_information_content_enum:
    permissible_values:
      case_based:
        title: Case-based
        description: 'Examples from training, validation, or operations that are pertinent
          to the current situation.

          '
      sensitivity:
        title: Sensitivity
        description: 'Information showing how much one or more task inputs would have
          to differ to change the output.

          '
      influence:
        title: Influence
        description: 'Information showing how much task inputs influence the output.

          '
      confidence_risk:
        title: Confidence/Risk
        description: 'Agent estimate of the likelihood of a correct output, task success,
          risk, or other event.

          '
      historic_performance:
        title: Historic performance
        description: 'Aggregate success statistics from prior training, validation,
          or operations pertinent to the current situation.

          '
      uncertainty:
        title: Uncertainty
        description: 'Agent estimate of lack of knowledge about the outcome, including
          aleatoric uncertainty, epistemic uncertainty, or out-of-distribution status.

          '
      logic_rationale:
        title: Logic rationale
        description: 'Information exposing the agent logic or rationale that led to
          the output.

          '
  meta_information_modality_enum:
    permissible_values:
      narrative:
        title: Narrative
        description: Text-based presentation, usually one or more sentences.
      values:
        title: Values
        description: Numeric presentation such as percentages or frequencies.
      graphical:
        title: Graphical
        description: Visual presentation such as highlights, plots, or charts.
  meta_information_interactivity_enum:
    permissible_values:
      interactive:
        title: true
        description: 'The supervisor can interact with meta-information to reveal
          aspects, trends, or agent behavior.

          '
      non_interactive:
        title: non_interactive
        description: 'The supervisor receives the meta-information without interactive
          exploration.

          '
  meta_information_timing_enum:
    permissible_values:
      proactive:
        title: Pro-active
        description: 'Meta-information is initiated before the agent performs the
          task.

          '
      concurrent:
        title: Concurrent
        description: 'Meta-information is provided at the same time as the agent recommendation
          or course of action.

          '
      post_hoc:
        title: Post-hoc
        description: 'Meta-information is provided after the agent output or action,
          usually in response to a request or trigger.

          '
