classes:
  PaperReview:
    tree_root: true
    description: Review answers for taxonomy Requirements engineering paper classification
      and evaluation criteria + Taxonomy of AI explainability techniques + Taxonomy
      of trust in AI
    slots:
    - paper_id
    - taxonomy_id
    - paper_class
    - explanation_interaction
    - explanation_target
    - explanation_scope
    - explanation_generation
    - explanation_representation
    - explanation_modality
