    - trust_parameter
    - technical_metric
    - non_technical_metric
    - trust_dynamics
    - trust_principle
    - problem_clearly_stated
    - properties_clearly_stated
    - research_method_sound
    - knowledge_claim_validated
    - knowledge_increase_significant
    - related_work_sufficient
    - problem_explained
    - technique_novel
    - technique_well_described
    - technique_sound
    - broader_relevance_argued
    - competing_techniques_discussed
    - technique_clearly_described
    - technique_properties_stated
    - applicability_conditions_clear
    - framework_original
    - framework_sound
    - framework_insightful
    - position_sound
    - opinion_surprising
    - discussion_provoking
    - experience_original
    - report_sound
    - report_revealing
    - practitioner_relevance
slots:
  paper_id:
    range: string
    required: true
    description: Paper identifier in Paper Monitor.
  taxonomy_id:
    range: string
    required: true
    description: Composed taxonomy identifier.
  paper_class:
    title: Paper class
    required: true
    range: paper_class_enum
    multivalued: true
  explanation_interaction:
    title: Interaction type
    description: 'Whether the explanation adapts to user feedback or remains fixed.

      '
    required: true
    range: explanation_interaction_enum
