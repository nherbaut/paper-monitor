  interaction_type:
    title: Interaction type
    description: 'Type of interaction in which trust relationships occur.

      '
    required: true
    range: interaction_type_enum
    multivalued: false
  trust_factor_category:
    title: Trust factor category
    description: 'High-level grouping of factors influencing trust.

      '
    required: true
    range: trust_factor_category_enum
