enums:
  paper_class_enum:
    permissible_values:
      evaluation_research:
        title: Evaluation research
        description: 'Investigation of a problem in practice or of an implemented
          technique in practice. The focus is on empirical or analytical evaluation
          in a real-world context, with emphasis on the validity of the knowledge
          claim and the soundness of the research method.

          '
      proposal_of_solution:
        title: Proposal of solution
        description: 'Proposal of a novel or significantly improved technique, supported
          by argumentation or limited evidence, but without full validation in practice.

          '
      validation_research:
        title: Validation research
        description: 'Investigation of the properties of a solution that has not yet
          been implemented in practice, using controlled experiments, simulations,
          or formal analysis.

          '
      philosophical_paper:
        title: Philosophical paper
        description: 'Paper proposing a new conceptual framework or way of thinking
          about requirements engineering problems.

          '
      opinion_paper:
        title: Opinion paper
        description: 'Paper expressing the author''s viewpoint about practices, methods,
          or directions in the field.

          '
      personal_experience_paper:
        title: Personal experience paper
        description: 'Report of personal experience in applying techniques or working
          in projects, emphasizing observed outcomes and lessons learned.

          '
