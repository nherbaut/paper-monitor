  explanation_interaction_enum:
    permissible_values:
      static:
        title: Static
        description: 'Explanation does not change in response to user interaction.

          '
      interactive:
        title: Interactive
        description: 'Explanation allows iterative exploration or dialogue with the
          user.

          '
  explanation_target_enum:
    permissible_values:
      data:
        title: Data
        description: 'Explanation focuses on understanding datasets or feature structure.

          '
      model:
        title: Model
        description: 'Explanation focuses on understanding model behavior or predictions.

          '
  explanation_scope_enum:
    permissible_values:
      local:
        title: Local
        description: 'Explanation applies to a single prediction or instance.

          '
      global:
        title: Global
        description: 'Explanation describes overall model behavior.

          '
  explanation_generation_enum:
    permissible_values:
      direct:
        title: Directly interpretable
        description: 'The model itself is inherently interpretable and provides explanations.

          '
      post_hoc:
        title: Post-hoc
        description: 'Explanation is generated after model training using an auxiliary
          method.

          '
      self_explaining:
        title: Self-explaining
        description: 'The model generates explanations as part of its prediction process.

          '
  explanation_representation_enum:
    permissible_values:
      features:
        title: Feature-based
        description: 'Explanation highlights relevant features influencing predictions.

          '
      samples:
        title: Sample-based
        description: 'Explanation uses representative or similar instances.

          '
      distributions:
        title: Distribution-based
        description: 'Explanation characterizes statistical properties of data or
          model outputs.

          '
      surrogate_model:
        title: Surrogate model
        description: 'Explanation approximates the original model using a simpler
          interpretable model.

          '
      visualization:
        title: Visualization
        description: 'Explanation is presented through graphical or visual representations.

          '
  explanation_modality_enum:
    permissible_values:
      tabular:
        title: Tabular
        description: 'Structured data with rows and columns.

          '
      image:
        title: Image
        description: 'Visual data such as images.

          '
      text:
        title: Text
        description: 'Natural language or textual data.

          '
  explanation_persona_enum:
    permissible_values:
      data_scientist:
        title: Data scientist
        description: 'User developing or analyzing models.

          '
      domain_expert:
        title: Domain expert
        description: 'Specialist interpreting model outputs in context.

          '
      end_user:
        title: End user
        description: 'Non-expert affected by decisions.

          '
      regulator:
        title: Regulator
        description: 'Authority ensuring compliance and fairness.

          '
  interaction_type_enum:
    permissible_values:
      human_machine:
        title: "Human\u2013machine"
        description: 'Human is trustor and AI system is trustee.

          '
      machine_human:
        title: "Machine\u2013human"
        description: 'AI evaluates trustworthiness of human inputs or users.

          '
      machine_machine:
        title: "Machine\u2013machine"
        description: 'Autonomous systems evaluate each other.

          '
      ai_object:
        title: "AI\u2013object"
        description: 'AI evaluates trustworthiness of data, signals, or objects.

          '
  trust_factor_category_enum:
    permissible_values:
      human_based:
        title: Human-based
        description: 'Factors related to user traits, cognition, and perception.

          '
      context_based:
        title: Context-based
        description: 'Environmental, organizational, and situational factors.

          '
      technology_based:
        title: Technology-based
        description: 'Properties of the AI system itself.

          '
  trust_parameter_enum:
    permissible_values:
      ability:
        title: Ability
        description: 'Competence of the AI system (accuracy, reliability, performance).

          '
      integrity:
        title: Integrity
        description: 'Compliance with standards, rules, and regulations.

          '
      benevolence:
        title: Benevolence
        description: 'Alignment with human values and societal benefit.

          '
  technical_metric_enum:
    permissible_values:
      accuracy:
        title: Accuracy
        description: 'Correctness of predictions.

          '
      robustness:
        title: Robustness
        description: 'Stability under perturbations and adversarial conditions.

          '
      safety:
        title: Safety
        description: 'Avoidance of harmful outcomes.

          '
      reliability:
        title: Reliability
        description: 'Consistency of system behavior over time.

          '
      security:
        title: Security
        description: 'Resistance to attacks or manipulation.

          '
      transparency:
        title: Transparency
        description: 'Visibility into system processes.

          '
      explainability:
        title: Explainability
        description: 'Ability to provide understandable explanations.

          '
  non_technical_metric_enum:
    permissible_values:
      fairness:
        title: Fairness
        description: 'Absence of bias and discrimination.

          '
      privacy:
        title: Privacy
        description: 'Protection and control of personal data.

          '
      accountability:
        title: Accountability
        description: 'Ability to justify decisions and assign responsibility.

          '
      ethics:
        title: Ethics
        description: 'Alignment with moral principles.

          '
      transparency_social:
        title: Social transparency
        description: 'Communication of system behavior to stakeholders.

          '
  trust_dynamics_enum:
    permissible_values:
      trust_builder:
        title: Trust builder
        description: 'Factors increasing trust (e.g., explanations, certification).

          '
      trust_breaker:
        title: Trust breaker
        description: 'Factors decreasing trust (e.g., opacity, bias, autonomy threats).

          '
      trust_calibration:
        title: Trust calibration
        description: 'Adjustment of trust to appropriate levels (avoid over/under-trust).

          '
  trust_principle_enum:
    permissible_values:
      beneficence:
        title: Beneficence
        description: 'AI should benefit humans and society.

          '
      non_maleficence:
        title: Non-maleficence
        description: 'AI should avoid harm.

          '
      autonomy:
        title: Autonomy
        description: 'Respect for human control and agency.

          '
      justice:
        title: Justice
        description: 'Fair distribution of benefits and risks.

          '
      explicability:
        title: Explicability
        description: 'Systems must be explainable and understandable.

          '
