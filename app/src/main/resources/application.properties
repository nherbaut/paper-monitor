quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.log.sql=false
quarkus.qute.content-types.html=text/html
quarkus.http.limits.max-body-size=50M
quarkus.http.limits.max-form-attribute-size=1M
%dev.quarkus.datasource.devservices.enabled=true
%dev.quarkus.datasource.devservices.db-name=paper_monitor
%dev.quarkus.datasource.devservices.username=paper_monitor
%dev.quarkus.datasource.devservices.password=paper_monitor
%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.datasource.devservices.db-name=paper_monitor_test
%test.quarkus.datasource.devservices.username=paper_monitor
%test.quarkus.datasource.devservices.password=paper_monitor
%prod.quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL}
%prod.quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME}
%prod.quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD}
paper-monitor.poller.every=60s
paper-monitor.storage.root=${PAPER_MONITOR_STORAGE_ROOT}
%dev.paper-monitor.storage.root=../data/uploads
paper-monitor.git.root=${PAPER_MONITOR_GIT_ROOT}
%dev.paper-monitor.git.root=../data/git-refs
paper-monitor.base-url=${PAPER_MONITOR_BASE_URL}
%dev.paper-monitor.base-url=http://localhost:8080
paper-monitor.tts.base-url=${PAPER_MONITOR_TTS_BASE_URL}
%dev.paper-monitor.tts.base-url=http://localhost:8090
paper-monitor.pde.base-url=${PAPER_MONITOR_PDE_BASE_URL}
%dev.paper-monitor.pde.base-url=http://localhost:8091
paper-monitor.tts.default-voice=en_US-lessac-medium
paper-monitor.auth.session.cookie-name=paper_monitor_session
paper-monitor.auth.session.ttl-days=30
paper-monitor.auth.oidc.issuer=https://auth.nextnet.top
paper-monitor.auth.oidc.client-id=${PAPER_MONITOR_OIDC_CLIENT_ID} 
paper-monitor.auth.oidc.client-secret=${PAPER_MONITOR_OIDC_CLIENT_SECRET}
paper-monitor.auth.oidc.scopes=openid profile email groups
paper-monitor.auth.oidc.enabled=true
paper-monitor.auth.github.client-id=${PAPER_MONITOR_GITHUB_CLIENT_ID:}
paper-monitor.auth.github.client-secret=${PAPER_MONITOR_GITHUB_CLIENT_SECRET:}
paper-monitor.auth.github.scopes=read:user user:email
paper-monitor.auth.github.enabled=${PAPER_MONITOR_GITHUB_ENABLED:false}
paper-monitor.auth.github.web-base-url=${PAPER_MONITOR_GITHUB_WEB_BASE_URL:https://github.com}
paper-monitor.auth.github.api-base-url=${PAPER_MONITOR_GITHUB_API_BASE_URL:https://api.github.com}
paper-monitor.mail.from=${PAPER_MONITOR_MAIL_FROM:no-reply@paper-monitor.local}
quarkus.mailer.from=${PAPER_MONITOR_MAIL_FROM:no-reply@paper-monitor.local}
quarkus.mailer.host=${PAPER_MONITOR_SMTP_HOST:localhost}
quarkus.mailer.port=${PAPER_MONITOR_SMTP_PORT:1025}
quarkus.mailer.username=${PAPER_MONITOR_SMTP_USERNAME:}
quarkus.mailer.password=${PAPER_MONITOR_SMTP_PASSWORD:}
quarkus.mailer.start-tls=${PAPER_MONITOR_SMTP_STARTTLS:DISABLED}
quarkus.mailer.login=${PAPER_MONITOR_SMTP_LOGIN:DISABLED}
quarkus.mailer.mock=${PAPER_MONITOR_SMTP_MOCK:false}
quarkus.container-image.build=true
quarkus.container-image.builder=docker
quarkus.docker.dockerfile-jvm-path=src/main/docker/Dockerfile.jvm
